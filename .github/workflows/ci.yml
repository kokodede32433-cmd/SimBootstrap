name: SimBootstrap CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore SimBootstrap.sln

    - name: Build Solution
      run: dotnet build SimBootstrap.sln --no-restore --configuration Release

    - name: Run Tests
      run: dotnet test SimBootstrap.sln --no-build --configuration Release
