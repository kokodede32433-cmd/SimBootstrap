name: Secure Agent START_APPROVED_APP E2E

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  start-app-e2e:
    name: Run START_APPROVED_APP E2E on Windows Test Node
    runs-on:
      - self-hosted
      - Windows
      - X64
      - simplatform-windows-test
    timeout-minutes: 15

    steps:
      - name: Checkout SimBootstrap
        uses: actions/checkout@v4

      - name: Run E2E script
        shell: cmd
        env:
          SIMCRM_STAGING_SUPABASE_URL: ${{ secrets.SIMCRM_STAGING_SUPABASE_URL }}
          SIMCRM_STAGING_SUPABASE_ANON_KEY: ${{ secrets.SIMCRM_STAGING_SUPABASE_ANON_KEY }}
          SIMCRM_STAGING_PAIR_CODE_TOKEN: ${{ secrets.SIMCRM_STAGING_PAIR_CODE_TOKEN }}
          E2E_EMAIL: "e2e_owner@simcrm.local"
          E2E_PASSWORD: ${{ secrets.SIMCRM_STAGING_E2E_PASSWORD }}
        run: >
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts\windows-test-node\Invoke-StartAppE2E.ps1
          -RunId "${{ github.run_id }}-${{ github.run_attempt }}"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-node-start-app-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: C:\SimPlatformTestNode\runs\${{ github.run_id }}-${{ github.run_attempt }}\artifacts
          if-no-files-found: warn
          retention-days: 14
