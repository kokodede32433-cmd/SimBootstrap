name: Build SimAgent Candidate

on:
  push:
    branches:
      - feature/one-click-setup
  workflow_dispatch:
    inputs:
      simagent_commit:
        description: "SimAgent commit/branch to build"
        required: true
        default: "codex/start-approved-app-phase3"
        type: string
      release_tag:
        description: "Release tag to publish"
        required: true
        default: "simagent-stop-approved-app-staging-20260712"
        type: string

permissions:
  contents: write

env:
  SIMAGENT_COMMIT: ${{ inputs.simagent_commit || 'codex/start-approved-app-phase3' }}
  RELEASE_TAG: ${{ inputs.release_tag || 'simagent-stop-approved-app-staging-20260712' }}

jobs:
  build:
    runs-on:
      - self-hosted
      - Windows
      - X64
      - simplatform-windows-test
    steps:
      - name: Checkout SimBootstrap
        uses: actions/checkout@v4

      - name: Checkout SimAgent via native Git
        shell: cmd
        run: >
          powershell.exe -NoProfile -ExecutionPolicy Bypass -Command
          "if (Test-Path 'SimAgent') { Remove-Item -Path 'SimAgent' -Recurse -Force };
          New-Item -ItemType Directory -Path 'SimAgent' | Out-Null;
          cd SimAgent;
          git init;
          git remote add origin https://github.com/kokodede32433-cmd/SimAgent.git;
          git fetch --depth 1 origin $env:SIMAGENT_COMMIT;
          git checkout --detach FETCH_HEAD"

      - name: Publish SimAgent Service and SessionHost
        shell: cmd
        run: >
          powershell.exe -NoProfile -ExecutionPolicy Bypass -Command
          "dotnet publish SimAgent/src/SimAgent.Service/SimAgent.Service.csproj -c Release -r win-x64 --self-contained false -o artifacts/package/Agent;
          dotnet publish SimAgent/src/SimAgent.SessionHost/SimAgent.SessionHost.csproj -c Release -r win-x64 --self-contained false -o artifacts/package/SessionHost"

      - name: Verify publish output
        shell: cmd
        run: >
          powershell.exe -NoProfile -ExecutionPolicy Bypass -Command
          "if (-not (Test-Path 'artifacts/package/Agent/SimAgent.Service.exe')) {
            throw 'Published SimAgent.Service payload is missing SimAgent.Service.exe.'
          };
          if (-not (Test-Path 'artifacts/package/SessionHost/SimAgent.SessionHost.exe')) {
            throw 'Published SimAgent.SessionHost payload is missing SimAgent.SessionHost.exe.'
          }"

      - name: Compress Release Archive
        shell: cmd
        run: >
          powershell.exe -NoProfile -ExecutionPolicy Bypass -Command
          "cd SimAgent;
          $sha = (git rev-parse --short HEAD).Trim();
          cd ..;
          $zipName = 'simagent-service-win-x64-' + $sha + '.zip';
          Compress-Archive -Path 'artifacts/package/*' -DestinationPath ('artifacts/' + $zipName) -Force;
          Add-Content -Path $env:GITHUB_ENV -Value ('ZIP_NAME=' + $zipName);
          Add-Content -Path $env:GITHUB_ENV -Value ('SHORT_SHA=' + $sha)"

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${RELEASE_TAG}" "artifacts/${ZIP_NAME}" --prerelease --title "SimAgent SessionHost staging candidate" --notes "Staging-only SimAgent Service + SessionHost payload. Source commit: ${SHORT_SHA}."
