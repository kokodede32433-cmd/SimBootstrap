name: Build SimAgent Candidate

on:
  push:
    branches:
      - feature/one-click-setup
  workflow_dispatch:
    inputs:
      simagent_commit:
        description: "SimAgent commit/branch to build"
        required: true
        default: "codex/start-approved-app-phase3"
        type: string
      release_tag:
        description: "Release tag to publish"
        required: true
        default: "simagent-stop-approved-app-staging-20260712"
        type: string

permissions:
  contents: write

env:
  SIMAGENT_COMMIT: ${{ inputs.simagent_commit || 'codex/start-approved-app-phase3' }}
  RELEASE_TAG: ${{ inputs.release_tag || 'simagent-stop-approved-app-staging-20260712' }}

jobs:
  build:
    runs-on:
      - self-hosted
      - Windows
      - X64
      - simplatform-windows-test
    steps:
      - name: Checkout SimBootstrap
        uses: actions/checkout@v4

      - name: Checkout SimAgent
        uses: actions/checkout@v4
        with:
          repository: kokodede32433-cmd/SimAgent
          ref: ${{ env.SIMAGENT_COMMIT }}
          path: SimAgent
          token: ${{ secrets.SIMAGENT_REPO_TOKEN }}
          persist-credentials: false

      - name: Test SimAgent solution
        shell: cmd
        run: >
          powershell.exe -NoProfile -ExecutionPolicy Bypass -Command
          "cd SimAgent;
          dotnet test SimAgent.sln"

      - name: Publish SimAgent Service and SessionHost
        shell: cmd
        run: >
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File
          scripts\windows-test-node\Build-SimAgentCandidatePackage.ps1
          -SimAgentDirectory "SimAgent"
          -OutputDirectory "artifacts"

      - name: Verify publish output
        shell: cmd
        run: >
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts\windows-test-node\Test-AgentPayload.ps1
          -PayloadDirectory "artifacts\package"

      - name: Compress Release Archive
        shell: cmd
        run: >
          powershell.exe -NoProfile -ExecutionPolicy Bypass -Command
          "cd SimAgent;
          $sha = (git rev-parse --short HEAD).Trim();
          cd ..;
          $zipName = 'simagent-service-win-x64-' + $sha + '.zip';
          Compress-Archive -Path 'artifacts/package/*' -DestinationPath ('artifacts/' + $zipName) -Force;
          Add-Content -Path $env:GITHUB_ENV -Value ('ZIP_NAME=' + $zipName);
          Add-Content -Path $env:GITHUB_ENV -Value ('SHORT_SHA=' + $sha)"

      - name: Create GitHub Release
        shell: cmd
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          powershell.exe -NoProfile -ExecutionPolicy Bypass -Command
          "gh release create $env:RELEASE_TAG ('artifacts/' + $env:ZIP_NAME) --prerelease --title 'SimAgent SessionHost staging candidate' --notes ('Staging-only SimAgent Service + SessionHost payload. Source commit: ' + $env:SHORT_SHA + '.')"
