name: Windows Agent Service Recovery

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recover-service:
    name: Start Existing SimAgentService
    runs-on:
      - self-hosted
      - Windows
      - X64
      - simplatform-windows-test
    timeout-minutes: 5

    steps:
      - name: Restore latest Agent backup and start service
        shell: cmd
        run: >
          powershell.exe -NoProfile -ExecutionPolicy Bypass -Command
          "$ErrorActionPreference = 'Stop';
          $serviceName = 'SimAgentService';
          $agentDirectory = 'C:\Program Files\SimBootstrap\Agent';
          $backupRoot = 'C:\Program Files\SimBootstrap\Agent.backups';
          Get-Process -Name 'SimAgent.SessionHost' -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue;
          $svc = Get-Service -Name $serviceName -ErrorAction Stop;
          if ($svc.Status -ne 'Stopped') {
            Stop-Service -Name $serviceName -Force;
            (Get-Service -Name $serviceName).WaitForStatus('Stopped', [TimeSpan]::FromSeconds(30));
          }
          $backup = Get-ChildItem -Path $backupRoot -Directory -ErrorAction Stop | Sort-Object LastWriteTime -Descending | Select-Object -First 1;
          if ($null -eq $backup) { throw 'No Agent backup directory is available.'; }
          if (Test-Path $agentDirectory) { Remove-Item -Path $agentDirectory -Recurse -Force; }
          Copy-Item -Path $backup.FullName -Destination $agentDirectory -Recurse -Force;
          Start-Service -Name $serviceName;
          (Get-Service -Name $serviceName).WaitForStatus('Running', [TimeSpan]::FromSeconds(30));
          Write-Host 'SimAgentService restored from latest local backup and is Running.'"
