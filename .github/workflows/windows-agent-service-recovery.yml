name: Windows Agent Service Recovery

on:
  workflow_dispatch:
    inputs:
      backup_index:
        description: "0 = newest backup, 1 = previous backup, etc."
        required: true
        default: "1"
        type: string

permissions:
  contents: read

jobs:
  recover-service:
    name: Start Existing SimAgentService
    runs-on:
      - self-hosted
      - Windows
      - X64
      - simplatform-windows-test
    timeout-minutes: 5

    steps:
      - name: Checkout SimBootstrap
        uses: actions/checkout@v4

      - name: Restore latest Agent backup and start service
        shell: cmd
        env:
          BACKUP_INDEX: ${{ inputs.backup_index }}
        run: >
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File
          scripts\windows-test-node\Invoke-AgentServiceRecovery.ps1
          -BackupIndex "${{ inputs.backup_index }}"
