name: Windows Agent Service Recovery

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recover-service:
    name: Start Existing SimAgentService
    runs-on:
      - self-hosted
      - Windows
      - X64
      - simplatform-windows-test
    timeout-minutes: 5

    steps:
      - name: Start existing service only
        shell: cmd
        run: >
          powershell.exe -NoProfile -ExecutionPolicy Bypass -Command
          "$ErrorActionPreference = 'Stop';
          $svc = Get-Service -Name 'SimAgentService' -ErrorAction Stop;
          if ($svc.Status -ne 'Running') {
            Start-Service -Name 'SimAgentService';
            (Get-Service -Name 'SimAgentService').WaitForStatus('Running', [TimeSpan]::FromSeconds(30));
          }
          Write-Host 'SimAgentService is Running.'"
