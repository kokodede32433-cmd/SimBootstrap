name: Secure Agent PING E2E

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Fixed staging command to verify"
        required: false
        default: "PING"
        type: choice
        options:
          - PING
          - GET_SIM_STATUS

jobs:
  secure-ping:
    name: Existing Agent Secure PING
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout SimBootstrap
        uses: actions/checkout@v4

      - name: Run command-only PING E2E
        shell: pwsh
        env:
          SIMCRM_STAGING_SUPABASE_URL: ${{ secrets.SIMCRM_STAGING_SUPABASE_URL }}
          SIMCRM_STAGING_SUPABASE_ANON_KEY: ${{ secrets.SIMCRM_STAGING_SUPABASE_ANON_KEY }}
          SIMCRM_STAGING_PAIR_CODE_TOKEN: ${{ secrets.SIMCRM_STAGING_PAIR_CODE_TOKEN }}
          E2E_COMMAND_TYPE: ${{ inputs.command || 'PING' }}
        run: |
          $ErrorActionPreference = "Stop"
          $expectedCommandType = $env:E2E_COMMAND_TYPE
          if ($expectedCommandType -notin @("PING", "GET_SIM_STATUS")) {
            throw "Unsupported workflow command input."
          }

          foreach ($name in @(
            "SIMCRM_STAGING_SUPABASE_URL",
            "SIMCRM_STAGING_SUPABASE_ANON_KEY",
            "SIMCRM_STAGING_PAIR_CODE_TOKEN"
          )) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "$name is not configured."
            }
            Write-Host "::add-mask::$([Environment]::GetEnvironmentVariable($name))"
          }

          $supabaseUrl = $env:SIMCRM_STAGING_SUPABASE_URL.TrimEnd("/")
          $issuerUrl = "$supabaseUrl/functions/v1/create-e2e-agent-command"
          $headers = @{
            apikey = $env:SIMCRM_STAGING_SUPABASE_ANON_KEY
            Authorization = "Bearer $($env:SIMCRM_STAGING_PAIR_CODE_TOKEN)"
            "Content-Type" = "application/json"
          }

          function Invoke-E2ECommandIssuer([hashtable]$Body) {
            $json = $Body | ConvertTo-Json -Compress
            return Invoke-RestMethod -Method Post -Uri $issuerUrl -Headers $headers -Body $json
          }

          function Assert-BlockedRpc([string]$Name) {
            $url = "$supabaseUrl/rest/v1/rpc/$Name"
            try {
              Invoke-RestMethod -Method Post -Uri $url -Headers @{
                apikey = $env:SIMCRM_STAGING_SUPABASE_ANON_KEY
                "Content-Type" = "application/json"
              } -Body "{}" | Out-Null
              throw "$Name unexpectedly executed through anon REST."
            } catch {
              $status = $null
              if ($_.Exception.Response -and $_.Exception.Response.StatusCode) {
                $status = [int]$_.Exception.Response.StatusCode
              }
              if ($status -ge 200 -and $status -lt 300) {
                throw "$Name unexpectedly returned HTTP $status."
              }
              Write-Host "$Name is absent or blocked for anon/PUBLIC."
            }
          }

          Assert-BlockedRpc "create_test_agent_command_v1"
          Assert-BlockedRpc "get_test_command_status_v1"

          $preflight = Invoke-E2ECommandIssuer @{ action = "preflight" }
          if (-not $preflight.agent.targetAgentConfigured) {
            throw "Configured E2E target Agent was not found."
          }
          if (-not $preflight.agent.isOnline) {
            throw "Configured E2E target Agent is not online/recent."
          }
          if (-not $preflight.unsafeRpc.createTestAgentCommandAbsentOrBlocked -or -not $preflight.unsafeRpc.getTestCommandStatusAbsentOrBlocked) {
            throw "Unsafe test RPC contract is still executable."
          }

          $agentCountBefore = [int]$preflight.agentCount
          $createAction = if ($expectedCommandType -eq "GET_SIM_STATUS") { "create_get_sim_status" } else { "create" }
          $create = Invoke-E2ECommandIssuer @{ action = $createAction }
          if ([string]::IsNullOrWhiteSpace($create.commandId)) {
            throw "Command issuer did not return a commandId."
          }
          if ($create.commandType -ne $expectedCommandType) {
            throw "Command issuer returned unexpected command type."
          }
          Write-Host "::add-mask::$($create.commandId)"
          Write-Host "Created one secured $expectedCommandType command."

          $deadline = (Get-Date).AddMinutes(4)
          $final = $null
          while ((Get-Date) -lt $deadline) {
            $status = Invoke-E2ECommandIssuer @{ action = "status"; commandId = $create.commandId }
            if ($status.status -in @("succeeded", "failed", "expired", "cancelled")) {
              $final = $status
              break
            }
            Start-Sleep -Seconds 10
          }

          if ($null -eq $final) {
            throw "Timed out waiting for PING completion."
          }

          if ($final.commandType -ne $expectedCommandType) {
            throw "Unexpected command type."
          }
          if ($final.status -ne "succeeded") {
            throw "$expectedCommandType did not succeed. Status: $($final.status)"
          }
          if ($expectedCommandType -eq "PING" -and $final.result.message -ne "pong") {
            throw "PING result was not pong."
          }
          if ($expectedCommandType -eq "GET_SIM_STATUS") {
            if ($final.result.status -ne "succeeded") {
              throw "GET_SIM_STATUS result status was not succeeded."
            }
            if ([string]::IsNullOrWhiteSpace($final.result.agentTimestamp)) {
              throw "GET_SIM_STATUS did not include agentTimestamp."
            }
            if ($final.result.PSObject.Properties.Name -notcontains "applications") {
              throw "GET_SIM_STATUS did not include applications."
            }
            $allowedIds = @(
              "assetto_corsa",
              "assetto_corsa_competizione",
              "f1",
              "iracing",
              "content_manager",
              "simhub",
              "simpro_manager",
              "simagic_manager"
            )
            foreach ($app in @($final.result.applications)) {
              if ($allowedIds -notcontains $app.id) {
                throw "GET_SIM_STATUS returned non-allowlisted application id."
              }
              if ($app.PSObject.Properties.Name -contains "processName" -or
                  $app.PSObject.Properties.Name -contains "path" -or
                  $app.PSObject.Properties.Name -contains "commandLine" -or
                  $app.PSObject.Properties.Name -contains "username" -or
                  $app.PSObject.Properties.Name -contains "windowTitle") {
                throw "GET_SIM_STATUS returned sensitive process detail."
              }
            }
            if (-not [string]::IsNullOrWhiteSpace($final.result.activeSimulator) -and $allowedIds -notcontains $final.result.activeSimulator) {
              throw "GET_SIM_STATUS returned non-allowlisted active simulator."
            }
          }
          if ([int]$final.attemptCount -ne 1) {
            throw "$expectedCommandType attempt_count was $($final.attemptCount), expected 1."
          }
          if ([int]$final.agentCount -ne $agentCountBefore) {
            throw "Agent count changed from $agentCountBefore to $($final.agentCount)."
          }
          if (-not $final.agent.isOnline) {
            throw "Agent was not online after PING execution."
          }
          if (-not $final.unsafeRpc.createTestAgentCommandAbsentOrBlocked -or -not $final.unsafeRpc.getTestCommandStatusAbsentOrBlocked) {
            throw "Unsafe test RPC contract became executable."
          }

          Write-Host "Secure $expectedCommandType E2E passed."
