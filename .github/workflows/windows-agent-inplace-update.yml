name: Windows Agent In-Place Update

on:
  workflow_dispatch:
    inputs:
      simagent_commit:
        description: "SimAgent commit to publish and install in place"
        required: true
        default: "d494bebadac122f2f68db37a53a257b9b8704ddc"
        type: string
      release_tag:
        description: "SimBootstrap prerelease tag containing the SimAgent payload zip"
        required: true
        type: string
      payload_asset_name:
        description: "Payload zip asset name"
        required: true
        default: "simagent-service-win-x64-d494beb.zip"
        type: string

permissions:
  contents: read

jobs:
  update-agent:
    name: In-place update on Windows Test Node
    runs-on:
      - self-hosted
      - Windows
      - X64
      - simplatform-windows-test
    timeout-minutes: 30

    steps:
      - name: Checkout SimBootstrap
        uses: actions/checkout@v4

      - name: Download staging payload
        shell: cmd
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          powershell.exe -NoProfile -ExecutionPolicy Bypass -Command
          "$ErrorActionPreference = 'Stop';
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null;
          gh release download '${{ inputs.release_tag }}' --repo '${{ github.repository }}' --pattern '${{ inputs.payload_asset_name }}' --dir artifacts;
          New-Item -ItemType Directory -Force -Path artifacts\simagent-service-win-x64 | Out-Null;
          Expand-Archive -Path (Join-Path 'artifacts' '${{ inputs.payload_asset_name }}') -DestinationPath artifacts\simagent-service-win-x64 -Force"

      - name: Verify publish output
        shell: cmd
        run: >
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts\windows-test-node\Test-AgentPayload.ps1
          -PayloadDirectory "artifacts\simagent-service-win-x64"
          -ExpectedCommit "${{ inputs.simagent_commit }}"

      - name: In-place update SimAgentService
        shell: cmd
        env:
          SIMCRM_STAGING_SUPABASE_URL: ${{ secrets.SIMCRM_STAGING_SUPABASE_URL }}
          SIMCRM_STAGING_SUPABASE_ANON_KEY: ${{ secrets.SIMCRM_STAGING_SUPABASE_ANON_KEY }}
          SIMCRM_STAGING_PAIR_CODE_TOKEN: ${{ secrets.SIMCRM_STAGING_PAIR_CODE_TOKEN }}
        run: >
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts\windows-test-node\Invoke-AgentInPlaceUpdate.ps1
          -PayloadDirectory "artifacts\simagent-service-win-x64"
          -InstalledSimAgentCommit "${{ inputs.simagent_commit }}"
          -RunId "${{ github.run_id }}-${{ github.run_attempt }}"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-agent-inplace-update-${{ github.run_id }}-${{ github.run_attempt }}
          path: C:\SimPlatformTestNode\runs\${{ github.run_id }}-${{ github.run_attempt }}\artifacts
          if-no-files-found: warn
          retention-days: 14
